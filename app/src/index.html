<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="-12 -12 24 24" fill="currentColor" aria-hidden="true">
          <path d="M0 -11 C1.2 -3 3 -1.2 11 0 C3 1.2 1.2 3 0 11 C-1.2 3 -3 1.2 -11 0 C-3 -1.2 -1.2 -3 0 -11 Z"/>
        </svg>
        <span class="brand-text">Claude Usage</span>
      </div>
      <div class="topbar-actions">
        <span class="updated-badge" id="updatedBadge"><span class="dot"></span><span id="updatedText">Connecting…</span></span>
        <button class="icon-btn" id="refreshBtn" title="Refresh now" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
        </button>
      </div>
    </header>

    <section class="widget" id="widget">
      <div class="empty" id="emptyState">
        <svg class="star" viewBox="-12 -12 24 24" fill="currentColor" aria-hidden="true">
          <path d="M0 -11 C1.2 -3 3 -1.2 11 0 C3 1.2 1.2 3 0 11 C-1.2 3 -3 1.2 -11 0 C-3 -1.2 -1.2 -3 0 -11 Z"/>
        </svg>
        <div class="empty-title">Setting up…</div>
        <p class="empty-msg" id="emptyMsg">Looking for your claude.ai session.</p>
        <button class="ghost-btn hidden" id="loginBtn">Sign in to claude.ai</button>
      </div>
    </section>

    <footer class="bottombar">
      <span class="hint" id="hint">Auto-refresh every 60 seconds</span>
    </footer>
  </main>
  <script type="module" src="main.js"></script>
</body>
</html>
