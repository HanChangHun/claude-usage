<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="-12 -12 24 24" fill="currentColor" aria-hidden="true">
          <path d="M0 -11 C1.2 -3 3 -1.2 11 0 C3 1.2 1.2 3 0 11 C-1.2 3 -3 1.2 -11 0 C-3 -1.2 -1.2 -3 0 -11 Z"/>
        </svg>
        <span class="brand-text">Claude Usage</span>
      </div>
      <div class="topbar-actions">
        <span class="updated-badge" id="updatedBadge"><span class="dot"></span><span id="updatedText">Connecting…</span></span>
        <button class="icon-btn" id="refreshBtn" title="Refresh now" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <section class="widget" id="widget">
      <div class="empty" id="emptyState">
        <svg class="star" viewBox="-12 -12 24 24" fill="currentColor" aria-hidden="true">
          <path d="M0 -11 C1.2 -3 3 -1.2 11 0 C3 1.2 1.2 3 0 11 C-1.2 3 -3 1.2 -11 0 C-3 -1.2 -1.2 -3 0 -11 Z"/>
        </svg>
        <div class="empty-title">Setting up…</div>
        <p class="empty-msg" id="emptyMsg">Looking for your claude.ai session.</p>
        <button class="ghost-btn hidden" id="loginBtn">Sign in to claude.ai</button>
      </div>
    </section>

    <section class="settings hidden" id="settingsPanel">
      <div class="settings-row">
        <label class="toggle">
          <input type="checkbox" id="autostartToggle">
          <span class="toggle-slider"></span>
          <span class="toggle-label">Start with Windows</span>
        </label>
      </div>
      <div class="settings-row settings-actions">
        <button class="settings-btn" id="signOutBtn">Sign out of claude.ai</button>
        <button class="settings-btn" id="checkUpdateBtn">Check for updates</button>
      </div>
      <div class="settings-status hidden" id="settingsStatus"></div>
      <div class="settings-meta">
        <span id="versionLabel">v0.3.0</span>
      </div>
    </section>

    <footer class="bottombar">
      <span class="hint" id="hint">Auto-refresh every 60 seconds</span>
    </footer>
  </main>
  <script type="module" src="main.js"></script>
</body>
</html>
